# ── সূত্র | suttro.app — Docker Compose ──
# For Coolify deployment on Contabo VPS
# Uses pre-built image from GHCR (built on GitHub Actions)

services:
  suttro-web:
    image: ghcr.io/shaaoonn/suttroapp:latest
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-https://suttro.app}
    restart: always
    deploy:
      resources:
        limits:
          memory: 768M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
